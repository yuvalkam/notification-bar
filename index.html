<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="nav-item" id="notifNavItem">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 01-3.46 0"/>
    </svg>
    <span class="notif-nav-badge" id="notifBadge"></span>
  </div>

  <div class="notif-dropdown" id="notifDropdown">
    <div class="notif-dd-header">
      <span>Notifications</span>
      <button class="notif-mark-all" id="notifMarkAll">Mark all read</button>
    </div>
    <div class="notif-tabs">
      <button class="notif-tab active" data-tab="all">All</button>
      <button class="notif-tab" data-tab="workspace">Workspace</button>
      <button class="notif-tab" data-tab="chat">Messages</button>
    </div>
    <div class="notif-list" id="notifList"></div>
    <div class="notif-dd-footer">
      <button>See all notifications</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
